version: '3.8'

services:
  app:
    build: .
    container_name: freelance_platform_app
    ports:
      - '4001:4001'
    depends_on:
      - mongo
      - redis
    environment:
      - MONGO_URL=mongodb://mongo:27017/freelance_platform_db
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    container_name: mongo_db
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: redis_db
    restart: always
    ports:
      - '6379:6379'

volumes:
  mongo_data:
